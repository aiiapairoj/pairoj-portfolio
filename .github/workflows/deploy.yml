name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Weekly refresh of GitHub repo data even with no commits
    - cron: "0 2 * * 1"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync GitHub repos data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ vars.GITHUB_USERNAME || 'aiiapairoj' }}
        run: npm run sync

      - name: Build static export
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.SITE_URL }}
        run: npm run build

      - name: List build output
        run: ls -la out/

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          server-dir: ${{ secrets.FTP_DIR }}
          local-dir: ./out/
          dangerous-clean-slate: false

      - name: Ping IndexNow (Bing/Yandex)
        if: ${{ vars.INDEXNOW_KEY != '' }}
        run: |
          curl -s "https://api.indexnow.org/indexnow?url=${{ vars.SITE_URL }}/&key=${{ vars.INDEXNOW_KEY }}" || true
